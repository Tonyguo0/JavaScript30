<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>HTML5 Canvas</title>
        <link rel="icon" href="https://fav.farm/🔥" />
    </head>
    <body>
        <canvas id="draw" width="800" height="800"></canvas>
        <script>
            const canvas = document.querySelector(`#draw`)
            const ctx = canvas.getContext('2d')
            console.log(ctx)
            // canvas width and height = to the window's inner width and height
            canvas.width = window.innerWidth
            canvas.height = window.innerHeight
            ctx.strokeStyle = '#BADA55'
            // TODO: enable these to see the differences
            ctx.lineJoin = 'round'
            ctx.lineCap = 'square'
            ctx.lineWidth = 20
            // flag to set it to false and when click down set to true and let go to false
            let isDrawing = false
            let lastX = 0
            let lastY = 0
            let hue = 0
            let direction = true

            function draw(e) {
                if (!isDrawing) return
                console.log(e)
                ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`
                ctx.beginPath()
                // start from
                ctx.moveTo(lastX, lastY)
                // go to
                ctx.lineTo(e.offsetX, e.offsetY)
                ctx.stroke()
                // destructuring and array
                ;[lastX, lastY] = [e.offsetX, e.offsetY]
                // hue just keeps going around and around
                hue++
                if (hue > 360) {
                    hue = 0
                }
                if (ctx.lineWidth >= 300 || ctx.lineWidth <= 1) {
                    direction = !direction
                }
                if (direction) {
                    ctx.lineWidth++
                } else {
                    ctx.lineWidth--
                }
                if (ctx.lineWidth % 2) {
                    ctx.lineCap = 'round'
                } else {
                    ctx.lineCap = 'square'
                }
            }

            document.addEventListener('mousemove', draw)
            document.addEventListener('mousedown', (e) => {
                isDrawing = true
                ;[lastX, lastY] = [e.offsetX, e.offsetY]
            })
            document.addEventListener('mouseup', () => {
                isDrawing = false
            })
            document.addEventListener('mouseout', () => {
                isDrawing = false
            })
        </script>

        <style>
            html,
            body {
                margin: 0;
            }
        </style>
    </body>
</html>
