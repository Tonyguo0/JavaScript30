<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Console Tricks!</title>
        <link rel="icon" href="https://fav.farm/🔥" />
    </head>
    <body>
        <p onClick="makeGreen()">×BREAK×DOWN×</p>

        <script>
            const dogs = [
                { name: 'Snickers', age: 2 },
                { name: 'hugo', age: 8 },
            ]

            function makeGreen() {
                const p = document.querySelector('p')
                p.style.color = '#BADA55'
                p.style.fontSize = '50px'
            }

            // Regular
            console.log(`hello`)

            // Interpolated
            console.log('Hello I am a %s string!', '💩')
            // can just use `` now

            // Styled

            // console.log('%c I am some great text', 'font-size:50px; background:red; text-shadow: 10px 10px 0 blue')

            // warning!
            console.warn('OH NOOOOOO')

            // Error :|
            console.error('Shoot!')

            // Info
            console.info('btw tea!')

            // Testing
            const p = document.querySelector('p')
            console.assert(1 === 2, 'that is wrong!')
            console.assert(p.classList.contains(''), 'not the right element')

            // clearing
            console.clear()

            // Viewing DOM Elements
            console.log(p.classList)
            console.dir(p)
            // Grouping together
            console.clear()
            dogs.forEach((dog) => {
                console.groupCollapsed(`${dog.name}`)
                console.log(`this is ${dog.name}`)
                console.log(`${dog.name} is ${dog.age} years old`)
                console.log(`${dog.name} is ${dog.age * 7} dog years old`)
                console.groupEnd(`${dog.name}`)
            })
            // counting
            console.count('Wes')
            console.count('Wes')
            console.count('Yo')
            console.count('Yo')
            console.count('Wes')
            console.count('Wes')
            console.count('Yo')
            console.count('Yo')
            console.count('Yo')
            console.count('Yo')

            // timing
            console.time('fetching data')
            fetch('https://api.github.com/users/tonyguo0')
                .then((data) => data.json())
                .then((data) => {
                    console.timeEnd('fetching data')
                    console.log(data)
                })
            console.table(dogs)
        </script>
    </body>
</html>
