<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Scoped CSS Variables and JS</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>

<body>
  <h2>Update CSS Variables with <span class='hl'>JS</span></h2>

  <div class="controls">
    <label for="spacing">Spacing:</label>
    <input id="spacing" type="range" name="spacing" min="10" max="200" value="10" data-sizing="px">

    <label for="blur">Blur:</label>
    <input id="blur" type="range" name="blur" min="0" max="25" value="10" data-sizing="px">

    <label for="base">Base Color</label>
    <input id="base" type="color" name="base" value="#ffc600">
  </div>

  <img style="width: 1300px; height: 600px;" src="./iMo2edLRwk3cd.png" sizes="(width <= 600px) 500px, 50vw">

  <style>
    :root {
      --base: green;
      --spacing: 10px;
      --blur: 0px;
    }

    img {
      padding: var(--spacing);
      background: var(--base);
      filter: blur(var(--blur));
    }

    .hl {
      color: var(--base)
    }

    /*
      misc styles, nothing to do with CSS variables
    */

    body {
      text-align: center;
      background: #193549;
      color: white;
      font-family: 'helvetica neue', sans-serif;
      font-weight: 100;
      font-size: 50px;
    }

    .controls {
      margin-bottom: 50px;
    }

    input {
      width: 100px;
    }
  </style>

  <script>
    const spacing = document.querySelector("#spacing")
    const blur = document.querySelector("#blur")
    const base = document.querySelector("#base")
    // TODO: use querySelector all to inplement a nodelist version of this to shorten the code
    const inputs = document.querySelectorAll(".controls input")
    console.log(inputs)
    const handleSpacingInput = () => {
      const spacingValue = spacing.value
      const suffix = spacing.dataset.sizing
      // console.log(spacing.value);
      // console.log(spacing.dataset.sizing)
      document.documentElement.style.setProperty("--spacing", `${spacingValue}${suffix}`)
    }
    const handleBlurInput = () => {
      const blurValue = blur.value
      const suffix = blur.dataset.sizing
      // console.log(blur.value);
      // console.log(blur.dataset.sizing)
      document.documentElement.style.setProperty("--blur", `${blurValue}${suffix}`)
    }
    const handleBaseInput = () => {
      const baseValue = base.value
      const suffix = base.dataset.sizing || ''
      // console.log(baseValue);
      // console.log(suffix)
      document.documentElement.style.setProperty("--base", `${baseValue}${suffix}`)
    }

    spacing.addEventListener("input", handleSpacingInput)
    // spacing.addEventListener("drag", handleSpacingInput)

    blur.addEventListener("input", handleBlurInput)

    base.addEventListener("input", handleBaseInput)
  </script>

</body>

</html>
