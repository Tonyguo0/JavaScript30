<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>JS Drum Kit</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="https://fav.farm/🔥" />
</head>

<body>


  <div class="keys">
    <div data-key="65" class="key">
      <kbd>A</kbd>
      <span class="sound">clap</span>
    </div>
    <div data-key="83" class="key">
      <kbd>S</kbd>
      <span class="sound">hihat</span>
    </div>
    <div data-key="68" class="key">
      <kbd>D</kbd>
      <span class="sound">kick</span>
    </div>
    <div data-key="70" class="key">
      <kbd>F</kbd>
      <span class="sound">openhat</span>
    </div>
    <div data-key="71" class="key">
      <kbd>G</kbd>
      <span class="sound">boom</span>
    </div>
    <div data-key="72" class="key">
      <kbd>H</kbd>
      <span class="sound">ride</span>
    </div>
    <div data-key="74" class="key">
      <kbd>J</kbd>
      <span class="sound">snare</span>
    </div>
    <div data-key="75" class="key">
      <kbd>K</kbd>
      <span class="sound">tom</span>
    </div>
    <div data-key="76" class="key">
      <kbd>L</kbd>
      <span class="sound">tink</span>
    </div>
  </div>

  <audio data-key="65" src="sounds/clap.wav"></audio>
  <audio data-key="83" src="sounds/hihat.wav"></audio>
  <audio data-key="68" src="sounds/kick.wav"></audio>
  <audio data-key="70" src="sounds/openhat.wav"></audio>
  <audio data-key="71" src="sounds/boom.wav"></audio>
  <audio data-key="72" src="sounds/ride.wav"></audio>
  <audio data-key="74" src="sounds/snare.wav"></audio>
  <audio data-key="75" src="sounds/tom.wav"></audio>
  <audio data-key="76" src="sounds/tink.wav"></audio>

  <script>
    const keys = document.getElementsByClassName(`key`);
    const sounds = document.getElementsByTagName(`audio`);
    // console.log(sounds)
    // console.log(keys[0])
    document.addEventListener("keydown", (event) => {
      const keyName = event.key;
      console.log(keyName)
      switch (keyName) {
        case `a`:
          keys[0].className = `key playing`;
          sounds[0].play();
          break;
        case `s`:
          keys[1].className = `key playing`;
          sounds[1].play();
          break;
        case `d`:
          keys[2].className = `key playing`;
          sounds[2].play();

          break;
        case `f`:
          keys[3].className = `key playing`;
          sounds[3].play();

          break;
        case `g`:
          keys[4].className = `key playing`;
          sounds[4].play();

          break;
        case `h`:
          keys[5].className = `key playing`;
          sounds[5].play();

          break;
        case `j`:
          keys[6].className = `key playing`;
          sounds[6].play();

          break;
        case `k`:
          keys[7].className = `key playing`;
          sounds[7].play();

          break;                
        case `l`:
          keys[8].className = `key playing`;
          sounds[8].play();

          break;
      }
    })

    document.addEventListener("keyup", (event) => {
      const keyName = event.key;
      // console.log(keyName)
      switch (keyName) {
        case `a`:
          keys[0].className = `key`;
          break;
        case `s`:
          keys[1].className = `key`;
          break;
        case `d`:
          keys[2].className = `key`;
          break;
        case `f`:
          keys[3].className = `key`;
          break;
        case `g`:
          keys[4].className = `key`;
          break;
        case `h`:
          keys[5].className = `key`;
          break;
        case `j`:
          keys[6].className = `key`;
          break;
        case `k`:
          keys[7].className = `key`;
          break;                
        case `l`:
          keys[8].className = `key`;
          break;
      }
    })
    // a.item(1).className = `key playing`;
  </script>


</body>

</html>
